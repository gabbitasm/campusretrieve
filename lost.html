<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Retrieve - Lost Items</title>
    <style>
        /* Reusing exact same layout styles for speed and visual consistency */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #ffffff; color: #3c4043; line-height: 1.6; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 1px solid #e0e0e0; }
        .logo { font-size: 1.4rem; font-weight: 500; color: #1a73e8; text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul a { text-decoration: none; color: #5f6368; font-weight: 500; padding: 8px 12px; border-radius: 4px; transition: background 0.2s; }
        nav ul a:hover, nav ul a.active { color: #1a73e8; background-color: #f1f3f4; }
        main { max-width: 800px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 400; margin-bottom: 40px; color: #202124; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .card { background: #f8f9fa; padding: 30px; border-radius: 8px; border: 1px solid #dadce0; }
        .card h3 { font-size: 1.25rem; font-weight: 500; margin-bottom: 10px; color: #202124; }
        .card p { font-size: 0.9rem; color: #70757a; font-style: italic; }
        .btn-container { margin-top: 20px; }
        .btn { display: inline-block; background-color: #1a73e8; color: white; text-decoration: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background-color: #1557b0; }
        footer { margin-top: 60px; padding: 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: center; gap: 30px; }
        footer a { color: #5f6368; text-decoration: none; font-size: 0.9rem; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Campus Retrieve</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="lost.html" class="active">Lost Items</a></li>
            <li><a href="found.html">Found Items</a></li>
            <li><a href="about.html">About Us</a></li>
        </ul>
    </nav>

    <main>
        <h1>Lost Items Search</h1>

        <div class="grid">
            <div class="card">
                <h3>Looking For a High-Worth Item?</h3>
                <p>(Keys, electronics, wallets...)</p>
            </div>
            
            <div class="card">
                <h3>Looking For General Belongings?</h3>
                <p>(Water bottles, notebooks, clothing...)</p>
            </div>
        </div>

        <div class="btn-container">
            <!-- This utilizes your designated Lost Items form URL -->
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdf87l3zXJjY6zE1C6L2eH7n-2v_NlW7_v5jK1zRk8N4L-P_g/viewform?usp=publish-editor" class="btn" target="_blank">
                File a Lost Item Report
            </a>
        </div>
    </main>

    <footer>
        <a href="about.html">About Us</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSedi1RdAEYi9gVZ1KjlD9Xtfbxm0CRY-34gP3lxwaejX1IWLw/viewform?usp=publish-editor" target="_blank">Contact Us</a>
    </footer>

</body>
</html>
